name: Build Sofle V2 Keymap

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout QMK Firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          submodules: recursive

      - name: Checkout userspace
        uses: actions/checkout@v4
        with:
          path: userspace

      - name: Setup QMK
        run: |
          python3 -m pip install --upgrade pip
          pip3 install qmk
          qmk setup -y

      - name: Copy keymap into QMK tree
        run: |
          mkdir -p keyboards/sofle/rgb/keymaps/sofle-v2-keymap
          cp -r userspace/keyboards/sofle/rgb/keymaps/sofle-v2-keymap/* keyboards/sofle/rgb/keymaps/sofle-v2-keymap/

      - name: Compile firmware
        run: qmk compile -kb sofle/rev1 -km sofle-v2-keymap -e CONVERT_TO=helios

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: sofle-v2-firmware
          path: |
            *.uf2
