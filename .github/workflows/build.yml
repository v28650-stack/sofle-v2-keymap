name: Build Sofle V2 Keymap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Disable git safe directory checks
        run: git config --global --add safe.directory '*'

      - name: Checkout QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          submodules: recursive

      - name: Checkout userspace
        uses: actions/checkout@v4
        with:
          path: userspace

      - name: Copy keymap files
        run: |
          mkdir -p keyboards/sofle/keymaps/sofle-v2-keymap
          cp -r userspace/keyboards/sofle/keymaps/sofle-v2-keymap/* keyboards/sofle/keymaps/sofle-v2-keymap/

      - name: Compile firmware
        run: qmk compile -kb sofle/rev1 -km sofle-v2-keymap

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: sofle-v2-firmware
          path: "*.uf2"
